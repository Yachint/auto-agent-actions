name: auto-agent-actions

x-app-security: &app-security
  read_only: true
  init: true
  restart: unless-stopped
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  user: "1000:1000"
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777

x-common-environment: &common-environment
  LOG_LEVEL: ${LOG_LEVEL:-info}
  REDIS_URL: redis://redis:6379
  REVIEW_QUEUE_NAME: ${REVIEW_QUEUE_NAME:-pull-request-reviews}
  PUBLICATION_QUEUE_NAME: ${PUBLICATION_QUEUE_NAME:-pull-request-publications}
  GITHUB_ALLOWED_REPOSITORIES: ${GITHUB_ALLOWED_REPOSITORIES:?set GITHUB_ALLOWED_REPOSITORIES}

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--save", "900", "1", "--save", "300", "10"]
    volumes:
      - redis-data:/data
    networks: [backend]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    <<: *app-security
    build:
      context: .
      target: app-runtime
    command: ["node", "dist/src/server.js"]
    environment:
      <<: *common-environment
      HOST: 0.0.0.0
      PORT: 3000
      REVIEW_QUEUE_DEBOUNCE_MS: ${REVIEW_QUEUE_DEBOUNCE_MS:-1000}
      GITHUB_WEBHOOK_SECRET_FILE: /run/secrets/github_webhook_secret
    secrets: [github_webhook_secret]
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend, edge]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  publisher:
    <<: *app-security
    build:
      context: .
      target: app-runtime
    command: ["node", "dist/src/publisher-worker.js"]
    environment:
      <<: *common-environment
      GITHUB_APP_ID: ${GITHUB_APP_ID:?set GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_private_key
      READ_TOKEN_BROKER_SOCKET: /run/auto-agent-actions/read-token-broker.sock
      READ_TOKEN_BROKER_SECRET_FILE: /run/secrets/read_token_broker_secret
      PUBLISHER_WORKER_CONCURRENCY: ${PUBLISHER_WORKER_CONCURRENCY:-5}
      REVIEW_MINIMUM_CONFIDENCE: ${REVIEW_MINIMUM_CONFIDENCE:-0.8}
      REVIEW_MAXIMUM_INLINE_COMMENTS: ${REVIEW_MAXIMUM_INLINE_COMMENTS:-20}
      RECONCILIATION_INTERVAL_MS: ${RECONCILIATION_INTERVAL_MS:-900000}
    secrets: [github_app_private_key, read_token_broker_secret]
    volumes:
      - token-broker:/run/auto-agent-actions
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend, egress]
    pids_limit: 128
    mem_limit: 384m
    cpus: 1.0

  analysis:
    <<: *app-security
    build:
      context: .
      target: analysis-runtime
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:?set CODEX_CLI_VERSION}
    command: ["node", "dist/src/analysis-worker.js"]
    environment:
      <<: *common-environment
      HOME: /home/node
      CODEX_HOME: /var/lib/codex
      READ_TOKEN_BROKER_SOCKET: /run/auto-agent-actions/read-token-broker.sock
      READ_TOKEN_BROKER_SECRET_FILE: /run/secrets/read_token_broker_secret
      REVIEW_DATA_DIR: /var/lib/auto-agent-actions
      REVIEW_WORKER_CONCURRENCY: ${REVIEW_WORKER_CONCURRENCY:-1}
      ABANDONED_WORKTREE_AGE_MS: ${ABANDONED_WORKTREE_AGE_MS:-86400000}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.6-sol}
      CODEX_REASONING_EFFORT: ${CODEX_REASONING_EFFORT:-high}
      CODEX_TIMEOUT_MS: ${CODEX_TIMEOUT_MS:-600000}
      CODEX_BINARY: codex
    secrets: [read_token_broker_secret]
    volumes:
      - token-broker:/run/auto-agent-actions:ro
      - review-data:/var/lib/auto-agent-actions
      - type: bind
        source: ${CODEX_CREDENTIALS_DIR:?set CODEX_CREDENTIALS_DIR}
        target: /var/lib/codex
    depends_on:
      redis:
        condition: service_healthy
      publisher:
        condition: service_started
    networks: [backend, egress]
    pids_limit: 256
    mem_limit: ${ANALYSIS_MEMORY_LIMIT:-4g}
    cpus: ${ANALYSIS_CPU_LIMIT:-2.0}

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10-alpine}
    restart: unless-stopped
    read_only: true
    environment:
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN:?set WEBHOOK_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    depends_on:
      server:
        condition: service_healthy
    networks: [edge, egress]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5

networks:
  backend:
    internal: true
  edge:
    internal: true
  egress: {}

volumes:
  redis-data:
  review-data:
  token-broker:
  caddy-data:
  caddy-config:

secrets:
  github_app_private_key:
    file: ${GITHUB_APP_PRIVATE_KEY_HOST_FILE:?set GITHUB_APP_PRIVATE_KEY_HOST_FILE}
  github_webhook_secret:
    file: ${GITHUB_WEBHOOK_SECRET_HOST_FILE:?set GITHUB_WEBHOOK_SECRET_HOST_FILE}
  read_token_broker_secret:
    file: ${READ_TOKEN_BROKER_SECRET_HOST_FILE:?set READ_TOKEN_BROKER_SECRET_HOST_FILE}
